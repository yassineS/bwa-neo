name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  build-make:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -q -y zlib1g-dev

      - name: Compile with Make (${{ matrix.compiler }})
        run: make CC=${{ matrix.compiler }}

      - name: Smoke test (bash)
        run: chmod +x tests/smoke_align.sh && tests/smoke_align.sh ./bwa

      - name: Golden SAM regression
        run: chmod +x tests/golden_sam.sh && tests/golden_sam.sh ./bwa

      - name: Golden SAMPE regression
        run: chmod +x tests/golden_sampe.sh && tests/golden_sampe.sh ./bwa

  build-cmake:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -q -y zlib1g-dev cmake ninja-build samtools

      - name: Configure and build (CMake)
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then export CXX=g++; else export CXX=clang++; fi
          cmake -S . -B build -G Ninja -DCMAKE_C_COMPILER=${{ matrix.compiler }} -DCMAKE_CXX_COMPILER="$CXX" -DBUILD_TESTING=ON
          cmake --build build

      - name: CTest
        run: ctest --test-dir build --output-on-failure

  build-asan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -q -y zlib1g-dev cmake ninja-build

      - name: Build with ASan
        run: |
          cmake -S . -B build-asan -G Ninja -DBWA_NEO_ENABLE_ASAN=ON -DBUILD_TESTING=OFF
          cmake --build build-asan

  # Native ARM64 runners (no QEMU); matches x86 coverage with gcc and clang.
  build-aarch64:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        compiler: [gcc, clang]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -q -y zlib1g-dev

      - name: Compile with Make (${{ matrix.compiler }})
        run: make CC=${{ matrix.compiler }}
